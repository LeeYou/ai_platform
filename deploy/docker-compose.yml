# =============================================================================
# deploy/docker-compose.yml
# 开发/研发环境：训练子系统 + 测试子系统 + 授权子系统 + 编译管理子系统
# 不包含生产推理服务（生产使用 docker-compose.prod.yml）
#
# 使用方法（x86 系统）：
#   docker compose up -d --build          # 仅构建 x86 服务（默认）
#   docker compose logs -f train
#
# 如需同时构建 ARM/Windows 交叉编译服务：
#   docker compose --profile cross up -d --build
#
# 如需启动 GPU builder（CUDA devel / nvcc）：
#   docker compose --profile gpu-build up -d --build build-gpu
#
# 仅启动 ARM 编译服务：
#   docker compose --profile cross up -d --build build-arm
#
# 前置条件：
#   宿主机已创建 /data/ai_platform/ 目录结构（见 mount_template/）
#
# 构建优化：
#   - 推荐先运行 source scripts/enable_buildkit.sh 启用 BuildKit
#   - BuildKit 可显著加速构建（90%+ 时间节省）
# =============================================================================

version: "3.9"

# ---------------------------------------------------------------------------
# 环境变量（BuildKit 优化）
# ---------------------------------------------------------------------------
x-buildkit-env: &buildkit-env
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

# ---------------------------------------------------------------------------
# 公共配置（使用 YAML anchors 避免重复）
# ---------------------------------------------------------------------------
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "5"

x-restart: &default-restart
  restart: unless-stopped

# ---------------------------------------------------------------------------
# 服务定义
# ---------------------------------------------------------------------------
services:

  # ─── 授权管理子系统 ───────────────────────────────────────────────────────
  license:
    image: agilestar/ai-license-mgr:latest
    build:
      context: ..
      dockerfile: license/backend/Dockerfile
    container_name: ai-license-mgr
    <<: *default-restart
    ports:
      - "8003:8003"
    volumes:
      - /data/ai_platform/licenses:/data/licenses:rw
      - /data/ai_platform/logs/license:/app/logs:rw
      - /data/ai_platform/data/license:/app/data:rw
    environment:
      - TZ=Asia/Shanghai
      - AI_LICENSE_DB=/app/data/license.db
      - PRIVATE_KEYS_DIR=/app/data/private_keys
      - AI_ADMIN_TOKEN=${AI_ADMIN_TOKEN:-changeme}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging: *default-logging

  # ─── 训练子系统 ──────────────────────────────────────────────────────────
  train:
    image: agilestar/ai-train:latest
    build:
      context: ..
      dockerfile: train/Dockerfile
    container_name: ai-train
    <<: *default-restart
    shm_size: '2gb'  # 共享内存大小，用于 PyTorch DataLoader 多进程
    ports:
      - "8001:8001"
    volumes:
      - /data/ai_platform/datasets:/workspace/datasets:rw
      - /data/ai_platform/models:/workspace/models:rw
      - /data/ai_platform/logs/train:/workspace/logs:rw
      - /data/ai_platform/data/train:/app/data:rw
    environment:
      - TZ=Asia/Shanghai
      - REDIS_URL=redis://redis:6379/0
      - DATASETS_ROOT=/workspace/datasets
      - MODELS_ROOT=/workspace/models
      - TRAIN_DB_PATH=/app/data/train.db
      - AI_ADMIN_TOKEN=${AI_ADMIN_TOKEN:-changeme}
    depends_on:
      - redis
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging: *default-logging

  # ─── 测试子系统 ──────────────────────────────────────────────────────────
  test:
    image: agilestar/ai-test:latest
    build:
      context: ..
      dockerfile: test/Dockerfile
    container_name: ai-test
    <<: *default-restart
    ports:
      - "8002:8002"
    volumes:
      - /data/ai_platform/models:/workspace/models:ro
      - /data/ai_platform/datasets:/workspace/datasets:ro
      - /data/ai_platform/logs/test:/workspace/logs:rw
    environment:
      - TZ=Asia/Shanghai
      - AI_ADMIN_TOKEN=${AI_ADMIN_TOKEN:-changeme}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging: *default-logging

  # ─── Redis（训练任务消息队列）────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ai-redis
    <<: *default-restart
    ports:
      - "127.0.0.1:6379:6379"   # 仅宿主机本地可访问，不对外暴露
    volumes:
      - /data/ai_platform/data/redis:/data:rw
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # ─── 编译管理子系统 ──────────────────────────────────────────────────────
  build:
    image: agilestar/ai-builder-linux-x86:latest
    build:
      context: ..
      dockerfile: build/Dockerfile.linux_x86
    container_name: ai-builder
    <<: *default-restart
    ports:
      - "8004:8004"
    volumes:
      - /data/ai_platform/libs/linux_x86_64:/workspace/libs/linux_x86_64:rw
      - /data/ai_platform/logs/build:/app/build/backend/data/build_logs:rw
    environment:
      - TZ=Asia/Shanghai
      - LICENSE_SERVICE_URL=http://license:8003
      - TRAIN_SERVICE_URL=http://train:8001
      - BUILD_OUTPUT_DIR=/workspace/libs/linux_x86_64
      - BUILDER_IMAGE=agilestar/ai-builder-linux-x86:latest
      - BUILDER_TOOLCHAIN_PROFILE=cpu-ort
      - AI_ADMIN_TOKEN=${AI_ADMIN_TOKEN:-changeme}
    depends_on:
      - license
      - train
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging: *default-logging

  # ─── Linux x86_64 GPU 编译管理子系统（需 --profile gpu-build 才会启动）─────────
  build-gpu:
    image: agilestar/ai-builder-linux-x86-gpu:latest
    profiles: ["gpu-build"]
    build:
      context: ..
      dockerfile: build/Dockerfile.linux_x86_gpu
    container_name: ai-builder-gpu
    <<: *default-restart
    ports:
      - "8007:8004"
    volumes:
      - /data/ai_platform/libs/linux_x86_64:/workspace/libs/linux_x86_64:rw
      - /data/ai_platform/logs/build-gpu:/app/build/backend/data/build_logs:rw
    environment:
      - TZ=Asia/Shanghai
      - LICENSE_SERVICE_URL=http://license:8003
      - TRAIN_SERVICE_URL=http://train:8001
      - BUILD_OUTPUT_DIR=/workspace/libs/linux_x86_64
      - BUILDER_IMAGE=agilestar/ai-builder-linux-x86-gpu:latest
      - BUILDER_TOOLCHAIN_PROFILE=cuda11.8-cudnn8
      - AI_ADMIN_TOKEN=${AI_ADMIN_TOKEN:-changeme}
    depends_on:
      - license
      - train
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging: *default-logging

  # ─── ARM64 编译管理子系统（需 --profile cross 才会启动）─────────────────────
  build-arm:
    image: agilestar/ai-builder-linux-arm:latest
    profiles: ["cross"]
    build:
      context: ..
      dockerfile: build/Dockerfile.linux_arm
    container_name: ai-builder-arm
    <<: *default-restart
    ports:
      - "8005:8004"
    volumes:
      - /data/ai_platform/libs/linux_aarch64:/workspace/libs/linux_aarch64:rw
      - /data/ai_platform/logs/build-arm:/app/build/backend/data/build_logs:rw
    environment:
      - TZ=Asia/Shanghai
      - LICENSE_SERVICE_URL=http://license:8003
      - TRAIN_SERVICE_URL=http://train:8001
      - BUILD_OUTPUT_DIR=/workspace/libs/linux_aarch64
      - AI_ADMIN_TOKEN=${AI_ADMIN_TOKEN:-changeme}
    depends_on:
      - license
      - train
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging: *default-logging

  # ─── Windows 交叉编译管理子系统（需 --profile cross 才会启动）────────────────
  build-windows:
    image: agilestar/ai-builder-windows:latest
    profiles: ["cross"]
    build:
      context: ..
      dockerfile: build/Dockerfile.windows
    container_name: ai-builder-windows
    <<: *default-restart
    ports:
      - "8006:8004"
    volumes:
      - /data/ai_platform/libs/windows_x86_64:/workspace/libs/windows_x86_64:rw
      - /data/ai_platform/logs/build-windows:/app/build/backend/data/build_logs:rw
    environment:
      - TZ=Asia/Shanghai
      - LICENSE_SERVICE_URL=http://license:8003
      - TRAIN_SERVICE_URL=http://train:8001
      - BUILD_OUTPUT_DIR=/workspace/libs/windows_x86_64
      - AI_ADMIN_TOKEN=${AI_ADMIN_TOKEN:-changeme}
    depends_on:
      - license
      - train
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging: *default-logging

# ---------------------------------------------------------------------------
# 数据卷
# ---------------------------------------------------------------------------
# 注：所有持久化数据已迁移到宿主机 /data/ai_platform/data/ 目录，
# 不再使用 Docker volumes，便于数据备份和迁移
